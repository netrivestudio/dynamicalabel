<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Dynamicalabel</title>

  <!-- PWA -->
  <meta name="theme-color" content="#111111" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- Icons -->
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="container">

    <h1>Dynamicalabel</h1>

    <div class="form">

      <input 
        type="date" 
        id="tanggal" 
      />

      <input 
        type="text" 
        id="sumber" 
        placeholder="Sumber (Shopee, Tokopedia...)" 
      />

      <input 
        type="number" 
        id="jumlah" 
        placeholder="Jumlah pemasukan" 
      />

      <div class="button-group">

        <button onclick="tambahPemasukan()">
          Tambah
        </button>

        <button onclick="hapusSemua()" class="hapus">
          Hapus Semua
        </button>

        <button onclick="exportExcel()" class="export">
          Export Excel
        </button>

      </div>

    </div>

    <div class="summary">
      <h2>Total: Rp <span id="total">0</span></h2>
    </div>

    <table>

      <thead>
        <tr>
          <th>Tanggal</th>
          <th>Sumber</th>
          <th>Jumlah</th>
        </tr>
      </thead>

      <tbody id="riwayat"></tbody>

    </table>

  </div>

  <!-- XLSX -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- Main Script -->
  <script src="script.js"></script>

  <!-- Register Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {

      window.addEventListener('load', () => {

        navigator.serviceWorker
          .register('./sw.js')

          .then((registration) => {
            console.log('Service Worker berhasil:', registration.scope);
          })

          .catch((error) => {
            console.log('Service Worker gagal:', error);
          });

      });

    }
  </script>

</body>
</html>
